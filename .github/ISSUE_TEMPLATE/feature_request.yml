name: Feature request
description: Suggest a backend, behavior, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem / use case
      description: What are you trying to do that the skill doesn't do well today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed change
      description: What would you add or change? If it's a new transcription backend, note cost and whether audio leaves the machine.
    validations:
      required: true
  - type: checkboxes
    id: gate
    attributes:
      label: Cost-gate compatibility
      description: The skill must never spend money or upload audio before the user approves at the gate.
      options:
        - label: This change keeps the cost gate intact (no spend/upload before a user yes)
          required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you thought about solving this.
